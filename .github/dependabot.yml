version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        # Keep the TypeScript compiler out of the group so major/breaking
        # compiler bumps (e.g. 5.x -> 7.x) arrive as their own reviewable PR,
        # separate from routine type-definition updates like @types/node.
        exclude-patterns:
          - "typescript"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
