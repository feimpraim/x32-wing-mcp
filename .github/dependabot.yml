version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7.x is the native (Go) compiler rewrite and breaks this
      # build; hold on the 5.x line until the migration is done deliberately.
      # Patch/minor 5.x updates still come through.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
        # Keep the TypeScript compiler out of the group so major/breaking
        # compiler bumps (e.g. 5.x -> 7.x) arrive as their own reviewable PR,
        # separate from routine type-definition updates like @types/node.
        exclude-patterns:
          - "typescript"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
